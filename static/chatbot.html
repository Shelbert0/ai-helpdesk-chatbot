<!DOCTYPE html>
<html>
<head>
  <title>IT HelpDesk Chatbot</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 40px;
    }

    #chatbox {
      max-width: 700px;
      margin: 0 auto;
      background: #ffffff;
      padding: 32px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 32px;
    }

    #messages {
      min-height: 120px;
      max-height: 320px;
      overflow-y: auto;
      padding: 10px 0;
      margin-bottom: 20px;
    }

    .message {
      margin-bottom: 16px;
      padding: 14px 16px;
      border-radius: 14px;
      line-height: 1.5;
      max-width: 85%;
      white-space: pre-wrap;
    }

    .user {
      background: #e8f0ff;
      margin-left: auto;
      text-align: right;
    }

    .bot {
      background: #f1f1f1;
      margin-right: auto;
    }

    .label {
      font-weight: bold;
      display: block;
      margin-bottom: 6px;
    }

    #inputArea {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 14px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 10px;
    }

    button {
      padding: 14px 22px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #111827;
      color: white;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

<div id="chatbox">
  <h1>IT HelpDesk Chatbot</h1>
  <div id="messages"></div>

  <div id="inputArea">
    <input type="text" id="userInput" placeholder="Ask a question..." />
    <button id="sendButton" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
const input = document.getElementById("userInput");
const messages = document.getElementById("messages");
const sendButton = document.getElementById("sendButton");

input.addEventListener("keydown", function(event) {
  if (event.key === "Enter") {
    sendMessage();
  }
});

function addMessage(sender, text, className) {
  const messageDiv = document.createElement("div");
  messageDiv.className = `message ${className}`;
  messageDiv.innerHTML = `<span class="label">${sender}</span>${text}`;
  messages.appendChild(messageDiv);
  messages.scrollTop = messages.scrollHeight;
  return messageDiv;
}

async function sendMessage() {
  const userMessage = input.value.trim();
  if (!userMessage) return;

  addMessage("You", userMessage, "user");
  input.value = "";
  sendButton.disabled = true;
  sendButton.textContent = "Thinking...";

  const typingMessage = addMessage("Bot", "Typing...", "bot");

  try {
    const response = await fetch("/chat", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ message: userMessage })
    });

    const data = await response.json();
    typingMessage.innerHTML = `<span class="label">Bot</span>${data.reply}`;
  } catch (error) {
    typingMessage.innerHTML = `<span class="label">Bot</span>Sorry, something went wrong. Please try again.`;
  }

  sendButton.disabled = false;
  sendButton.textContent = "Send";
  input.focus();
  messages.scrollTop = messages.scrollHeight;
}
  addMessage("Bot", "Hi! I can help with password resets, slow internet, email setup, and more. What do you need help with?", "bot");
</script>

</body>
</html>
